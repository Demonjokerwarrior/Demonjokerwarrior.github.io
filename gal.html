<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demon Warrior | Gallery · Blog · Comments</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <style>
    :root {
      --cyan: #00fff7;
      --cyan-dim: rgba(0,255,247,0.15);
      --red: #ff2255;
      --blue: #0a7eff;
      --green: #00ff41;
      --bg: #050810;
      --glass: rgba(5,14,22,0.82);
      --border: rgba(0,255,247,0.35);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: #d8f5f5;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }
    @media (max-width:768px) { body { cursor: auto; } }

    /* CURSOR */
    #cursor-ring { position:fixed;width:36px;height:36px;border:2px solid var(--cyan);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width 0.2s,height 0.2s;mix-blend-mode:screen; }
    #cursor-dot  { position:fixed;width:6px;height:6px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--cyan); }

    /* SCANLINES */
    body::before { content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,255,247,0.018) 2px,rgba(0,255,247,0.018) 4px);pointer-events:none;z-index:1000;animation:scanMove 12s linear infinite; }
    @keyframes scanMove { from{background-position:0 0} to{background-position:0 400px} }

    /* GRID BG */
    .grid-bg { position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(0,255,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,247,0.04) 1px,transparent 1px);background-size:60px 60px;animation:gridPulse 8s ease-in-out infinite alternate; }
    @keyframes gridPulse { 0%{opacity:0.4} 100%{opacity:1} }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 500;
      background: rgba(5,8,16,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,255,247,0.15);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1rem; font-weight: 900;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
      letter-spacing: 2px;
      text-decoration: none;
    }
    .nav-logo span { color: var(--red); }
    .nav-links { display:flex; gap:28px; list-style:none; }
    .nav-links a {
      font-size: 0.78rem; color: rgba(0,255,247,0.7);
      text-decoration: none; letter-spacing: 1.5px;
      transition: 0.2s; padding-bottom: 4px;
      border-bottom: 1px solid transparent;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
    }
    @media(max-width:600px){ .nav-links { gap:14px; } .nav-links a { font-size:0.68rem; } }

    /* PAGE HEADER */
    .page-hero {
      text-align: center;
      padding: 4rem 1rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .page-hero::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      box-shadow: 0 0 10px var(--cyan);
    }
    .page-hero-title {
      font-family: 'Orbitron', monospace;
      font-size: 2.6rem; font-weight: 900;
      color: #fff; letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(0,255,247,0.4);
      animation: glitchTitle 6s infinite;
    }
    @keyframes glitchTitle {
      0%,88%,100%{text-shadow:0 0 20px rgba(0,255,247,0.4);transform:none}
      91%{text-shadow:-3px 0 #ff0055,3px 0 #00ffff;transform:skewX(-6deg)}
      93%{text-shadow:3px 0 #ff0055,-3px 0 #00ffff;transform:skewX(4deg)}
    }
    .page-hero-sub { color: rgba(0,255,247,0.55); font-size:0.82rem; letter-spacing:2px; margin-top:8px; }

    /* TAB SYSTEM */
    .tab-bar {
      display: flex; justify-content: center; gap: 0;
      margin: 2rem auto 0;
      max-width: 600px;
      border: 1px solid rgba(0,255,247,0.2);
      border-radius: 50px;
      overflow: hidden;
      background: rgba(0,10,14,0.6);
    }
    .tab-btn {
      flex: 1; padding: 14px 24px;
      background: transparent;
      border: none; color: rgba(0,255,247,0.5);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem; letter-spacing: 2px;
      cursor: pointer; transition: 0.3s;
      position: relative;
    }
    .tab-btn.active {
      background: rgba(0,255,247,0.1);
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
    }
    .tab-btn:not(:last-child) { border-right: 1px solid rgba(0,255,247,0.15); }
    .tab-btn:hover:not(.active) { color: rgba(0,255,247,0.8); background: rgba(0,255,247,0.05); }

    /* CONTENT SECTION */
    .content-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem 20px; }
    .tab-panel { display: none; animation: panelIn 0.5s ease; }
    .tab-panel.active { display: block; }
    @keyframes panelIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ══ GALLERY ══ */
    .gallery-filter {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 2rem;
    }
    .filter-btn {
      padding: 6px 18px; border-radius: 20px;
      border: 1px solid rgba(0,255,247,0.3);
      background: transparent; color: rgba(0,255,247,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 1px;
      cursor: pointer; transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(0,255,247,0.12);
      border-color: var(--cyan); color: var(--cyan);
      box-shadow: 0 0 10px rgba(0,255,247,0.2);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .gallery-item {
      position: relative; border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(0,255,247,0.2);
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      background: rgba(0,15,20,0.8);
      aspect-ratio: 4/3;
    }
    .gallery-item:hover {
      transform: scale(1.03) translateY(-4px);
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,255,247,0.3), 0 20px 40px rgba(0,0,0,0.5);
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: filter 0.3s;
      filter: brightness(0.85) saturate(1.2);
    }
    .gallery-item:hover img { filter: brightness(1) saturate(1.5); }
    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 60%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 16px;
      opacity: 0; transition: opacity 0.3s;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-title { font-family:'Orbitron',monospace; font-size:0.85rem; color:#fff; margin-bottom:4px; }
    .gallery-cat {
      font-size: 0.65rem; letter-spacing: 1px;
      padding: 2px 10px; border-radius: 20px; display: inline-block; width: fit-content;
    }
    /* fallback if image missing */
    .gallery-item img::before {
      content: "⚠️";
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      color: var(--red);
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* gallery lightbox */
    #lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #lightbox.open { display: flex; animation: panelIn 0.3s ease; }
    #lightbox img { max-width: 90%; max-height: 75vh; border-radius: 16px; border: 2px solid var(--cyan); box-shadow: 0 0 40px rgba(0,255,247,0.4); }
    #lightboxClose { position: absolute; top: 20px; right: 24px; background: rgba(255,34,85,0.1); border: 1px solid var(--red); color: var(--red); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
    #lightboxClose:hover { background: rgba(255,34,85,0.25); }
    #lightboxCaption { font-family: 'Orbitron', monospace; color: var(--cyan); font-size: 0.9rem; letter-spacing: 2px; }

    /* ══ BLOG ══ */
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .blog-card {
      background: rgba(5,14,22,0.85); backdrop-filter: blur(12px);
      border-radius: 24px; border: 1px solid rgba(0,255,247,0.2);
      overflow: hidden; text-decoration: none; color: inherit;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      display: flex; flex-direction: column;
    }
    .blog-card:hover {
      transform: translateY(-8px);
      border-color: var(--cyan);
      box-shadow: 0 0 25px rgba(0,255,247,0.25), 0 20px 40px rgba(0,0,0,0.5);
    }
    .blog-card-banner {
      height: 160px; background: linear-gradient(135deg, #050810, #0d1f2e);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; position: relative; overflow: hidden;
      border-bottom: 1px solid rgba(0,255,247,0.1);
    }
    .blog-card-banner::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0,255,247,0.08), transparent 70%);
    }
    .blog-card-body { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .blog-tag {
      font-size: 0.62rem; letter-spacing: 1.5px;
      padding: 3px 10px; border-radius: 20px; display: inline-block; width: fit-content;
    }
    .tag-red   { border:1px solid rgba(255,34,85,0.5); color:#ff8899; background:rgba(255,34,85,0.08); }
    .tag-cyan  { border:1px solid rgba(0,255,247,0.4); color:#9ef0ed; background:rgba(0,255,247,0.06); }
    .tag-green { border:1px solid rgba(0,255,65,0.4); color:#7fffaa; background:rgba(0,255,65,0.06); }
    .tag-blue  { border:1px solid rgba(10,126,255,0.5); color:#6bb0ff; background:rgba(10,126,255,0.08); }
    .blog-title { font-family:'Orbitron',monospace; font-size:0.95rem; color:#fff; line-height:1.4; }
    .blog-excerpt { font-size:0.8rem; color:rgba(216,245,245,0.65); line-height:1.7; flex:1; }
    .blog-meta { display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(0,255,247,0.1); padding-top:10px; font-size:0.68rem; color:rgba(0,255,247,0.45); }
    .read-more { color:var(--cyan); font-size:0.72rem; letter-spacing:1px; transition:0.2s; cursor:pointer; background:none; border:none; font-family:'Share Tech Mono',monospace; }
    .read-more:hover { text-shadow:0 0 8px var(--cyan); }

    /* blog modal */
    #blogModal {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(14px);
      display: none; overflow-y: auto;
    }
    #blogModal.open { display: block; animation: panelIn 0.4s ease; }
    .blog-modal-inner {
      max-width: 780px; margin: 3rem auto;
      padding: 2rem; background: rgba(5,14,22,0.9);
      border-radius: 28px; border: 1px solid rgba(0,255,247,0.25);
      box-shadow: 0 0 50px rgba(0,255,247,0.1);
      position: relative;
    }
    #blogModalClose {
      position: sticky; top: 1rem; float: right;
      background: rgba(255,34,85,0.1); border: 1px solid var(--red);
      color: var(--red); font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem; padding: 6px 16px; border-radius: 20px;
      cursor: pointer; transition: 0.2s; letter-spacing: 1px;
    }
    #blogModalClose:hover { background: rgba(255,34,85,0.25); }
    #blogModalTitle { font-family:'Orbitron',monospace; font-size:1.5rem; color:var(--cyan); margin:1rem 0; line-height:1.3; text-shadow:0 0 15px rgba(0,255,247,0.3); }
    #blogModalMeta { font-size:0.72rem; color:rgba(0,255,247,0.45); margin-bottom:1.5rem; letter-spacing:1px; }
    #blogModalContent { font-size:0.88rem; line-height:1.9; color:#c5e8e8; }
    #blogModalContent h3 { font-family:'Orbitron',monospace; color:var(--cyan); margin:1.5rem 0 0.5rem; font-size:1rem; }
    #blogModalContent code { background:rgba(0,255,247,0.08); border:1px solid rgba(0,255,247,0.2); padding:2px 8px; border-radius:6px; color:var(--green); font-family:'Share Tech Mono',monospace; font-size:0.82rem; }
    #blogModalContent pre { background:rgba(0,0,0,0.6); border:1px solid rgba(0,255,247,0.2); border-radius:12px; padding:1rem; overflow-x:auto; margin:1rem 0; }
    #blogModalContent pre code { border:none; background:none; padding:0; }

    /* ══ COMMENTS ══ */
    .comments-section { max-width: 800px; margin: 0 auto; }

    /* google script setup box */
    .gs-setup-box {
      background: rgba(10,126,255,0.06);
      border: 1px solid rgba(10,126,255,0.35);
      border-radius: 20px; padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .gs-setup-box h3 { font-family:'Orbitron',monospace; color:#6bb0ff; font-size:0.9rem; margin-bottom:1rem; display:flex; align-items:center; gap:10px; }
    .gs-setup-box .gs-url-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .gs-url-input {
      flex: 1; min-width: 200px;
      background: rgba(0,20,40,0.6); border: 1px solid rgba(10,126,255,0.4);
      padding: 10px 14px; border-radius: 30px; color: #d8f5f5;
      font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
      outline: none; transition: 0.3s;
    }
    .gs-url-input:focus { border-color: #0a7eff; box-shadow: 0 0 12px rgba(10,126,255,0.3); }
    .gs-save-btn {
      padding: 10px 22px; border-radius: 30px;
      border: 1px solid #0a7eff; background: rgba(10,126,255,0.12);
      color: #6bb0ff; font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem; cursor: pointer; transition: 0.2s; white-space: nowrap;
      letter-spacing: 1px;
    }
    .gs-save-btn:hover { background: rgba(10,126,255,0.25); box-shadow: 0 0 12px rgba(10,126,255,0.3); }
    .gs-status { font-size:0.72rem; margin-top:8px; letter-spacing:1px; }
    .gs-status.ok  { color: var(--green); } .gs-status.err { color: var(--red); }
    .gs-tip { font-size:0.7rem; color:rgba(107,176,255,0.6); margin-top:8px; line-height:1.6; }
    details.gs-script-box { margin-top:1rem; }
    details.gs-script-box summary { cursor:pointer; color:#6bb0ff; font-size:0.78rem; letter-spacing:1px; user-select:none; }
    details.gs-script-box pre {
      margin-top:10px; background:rgba(0,0,0,0.7);
      border:1px solid rgba(10,126,255,0.25); border-radius:12px;
      padding:1rem; font-size:0.7rem; color:var(--green);
      overflow-x: auto; white-space:pre; line-height:1.6;
    }
    .copy-btn {
      margin-top: 8px; padding: 6px 16px; border-radius: 20px;
      border: 1px solid rgba(0,255,65,0.4); background: rgba(0,255,65,0.06);
      color: var(--green); font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; cursor: pointer; transition: 0.2s; letter-spacing: 1px;
    }
    .copy-btn:hover { background: rgba(0,255,65,0.15); box-shadow: 0 0 8px rgba(0,255,65,0.3); }

    /* comment form */
    .comment-form-box {
      background: var(--glass); backdrop-filter: blur(12px);
      border-radius: 24px; padding: 1.5rem;
      border: 1px solid var(--border); margin-bottom: 2rem;
    }
    .comment-form-box h3 { font-family:'Orbitron',monospace; color:var(--cyan); font-size:0.9rem; margin-bottom:1rem; display:flex; align-items:center; gap:10px; }
    .form-row { display:flex; gap:12px; flex-wrap:wrap; }
    .input-box {
      width:100%; background:rgba(0,30,40,0.6);
      border:1px solid rgba(0,255,247,0.3);
      padding:12px 16px; border-radius:30px;
      color:#d8f5f5; font-family:'Share Tech Mono',monospace;
      font-size:0.82rem; margin-bottom:12px;
      transition:border-color 0.3s,box-shadow 0.3s; outline:none;
    }
    .input-box:focus { border-color:var(--cyan); box-shadow:0 0 12px rgba(0,255,247,0.25); }
    .form-row .input-box { margin-bottom:0; flex:1; min-width:140px; }
    .form-row-gap { margin-bottom:12px; }
    textarea.input-box { border-radius:16px; resize:vertical; min-height:100px; }
    .char-count { text-align:right; font-size:0.65rem; color:rgba(0,255,247,0.4); margin-bottom:10px; }
    .submit-btn {
      padding:12px 32px; border-radius:60px;
      border:1px solid var(--cyan); background:rgba(0,255,247,0.08);
      color:var(--cyan); font-family:'Share Tech Mono',monospace;
      font-size:0.88rem; cursor:pointer; transition:0.25s; letter-spacing:1px;
      position:relative; overflow:hidden;
    }
    .submit-btn:hover { box-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,255,247,0.15); color:#fff; transform:translateY(-2px); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    #formStatus { margin-top:12px; font-size:0.8rem; letter-spacing:1px; min-height:1.2em; }

    /* profanity warning */
    .prof-warn { color:var(--red); font-size:0.72rem; margin-top:-8px; margin-bottom:8px; display:none; }
    .prof-warn.visible { display:block; animation:panelIn 0.3s; }

    /* comment list */
    .comments-list { display:flex; flex-direction:column; gap:14px; }
    .comment-card {
      background: rgba(5,14,22,0.85); backdrop-filter:blur(8px);
      border-radius: 18px; padding: 1.2rem;
      border: 1px solid rgba(0,255,247,0.12);
      transition: border-color 0.3s;
      position: relative; overflow: hidden;
    }
    .comment-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
    .comment-card:hover { border-color:rgba(0,255,247,0.3); }
    .comment-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:6px; }
    .comment-name { font-family:'Orbitron',monospace; color:var(--cyan); font-size:0.82rem; }
    .comment-time { font-size:0.65rem; color:rgba(0,255,247,0.4); letter-spacing:1px; }
    .comment-text { font-size:0.82rem; color:#c5e8e8; line-height:1.7; word-break:break-word; }
    .comment-likes { margin-top:10px; display:flex; align-items:center; gap:8px; }
    .like-btn {
      background:rgba(255,34,85,0.08); border:1px solid rgba(255,34,85,0.3);
      color:#ff8899; font-family:'Share Tech Mono',monospace; font-size:0.7rem;
      padding:3px 12px; border-radius:20px; cursor:pointer; transition:0.2s;
    }
    .like-btn:hover { background:rgba(255,34,85,0.2); box-shadow:0 0 8px rgba(255,34,85,0.3); }
    .like-btn.liked { background:rgba(255,34,85,0.25); border-color:var(--red); color:var(--red); }
    .no-comments { text-align:center; padding:3rem; color:rgba(0,255,247,0.3); font-size:0.85rem; letter-spacing:1px; }

    /* loading spinner */
    .loading-ring { display:inline-block; width:20px;height:20px; border:2px solid rgba(0,255,247,0.2); border-top:2px solid var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* toast */
    #toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px);
      background:rgba(5,14,22,0.95); border:1px solid var(--cyan);
      color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:0.8rem;
      padding:12px 24px; border-radius:30px; z-index:9999;
      box-shadow:0 0 20px rgba(0,255,247,0.3);
      transition:transform 0.4s cubic-bezier(0.2,0.9,0.4,1);
      letter-spacing:1px;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.error { border-color:var(--red); color:var(--red); box-shadow:0 0 20px rgba(255,34,85,0.3); }

    /* scrollbar */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#050810; }
    ::-webkit-scrollbar-thumb { background:rgba(0,255,247,0.4); border-radius:3px; }

    footer { text-align:center; padding:24px; color:rgba(0,255,247,0.4); font-size:0.78rem; border-top:1px solid rgba(0,255,247,0.08); position:relative; }

async function submitComment() {
  const nameEl = document.getElementById('commentName');
  const textEl = document.getElementById('commentText');
  const handleEl = document.getElementById('commentHandle');
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('formStatus');

  const name = nameEl.value.trim();
  const handle = handleEl.value.trim();
  const text = textEl.value.trim();

  if (!name) { showToast('⚠ Please enter your name.', true); nameEl.focus(); return; }
  if (!text)  { showToast('⚠ Comment cannot be empty.', true); textEl.focus(); return; }
  if (text.length < 3) { showToast('⚠ Comment too short.', true); return; }

  if (containsProfanity(name + ' ' + text)) {
    document.getElementById('profWarn').classList.add('visible');
    showToast('⚠ Flagged language detected. Please rephrase.', true);
    return;
  }

  const displayName = handle ? `${name} (${handle})` : name;
  btn.disabled = true;
  status.innerHTML = '<span class="loading-ring"></span> Sending...';

  const commentObj = {
    id: Date.now().toString(),
    name: displayName,
    comment: text,
    timestamp: new Date().toISOString(),
    likes: 0
  };

  let saved = false;

  if (GS_URL) {
    try {
      await fetch(GS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: displayName, comment: text })
      });
      saved = true;
    } catch (e) {
      console.warn('GS POST failed, falling back to local:', e);
    }
  }

  saveLocalComment(commentObj);

  status.innerHTML = '';
  btn.disabled = false;
  nameEl.value = '';
  textEl.value = '';
  handleEl.value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('profWarn').classList.remove('visible');

  showToast(saved ? '✅ Comment saved to database!' : '✅ Comment posted locally!');
  loadComments();
}

  const list = document.getElementById('commentsList');
  list.innerHTML = '<div class="no-comments"><span class="loading-ring"></span> Loading comments...</div>';

  let comments = [];

  if (GS_URL) {
    try {
      const res = await fetch(GS_URL + '?action=get', { method: 'GET' });
      const data = await res.json();
      if (data.comments) comments = data.comments;
    } catch (e) {
      console.warn('GAS fetch failed, using local:', e);
    }
  }

  const local = getLocalComments();
  const allIds = new Set(comments.map(c => c.id));
  local.forEach(c => { if (!allIds.has(c.id)) comments.push(c); });

  comments.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  document.getElementById('commentCount').textContent = `(${comments.length})`;

  if (!comments.length) {
    list.innerHTML = `<div class="no-comments"><i class="fas fa-satellite-dish" style="font-size:2rem;display:block;margin-bottom:1rem;"></i>No messages yet — be the first to transmit.</div>`;
    return;
  }

  const likedSet = new Set(JSON.parse(localStorage.getItem('dw_liked') || '[]'));

  list.innerHTML = comments.map(c => {
    const liked = likedSet.has(c.id);
    const dt = new Date(c.timestamp);
    const timeStr = isNaN(dt) ? c.timestamp : dt.toLocaleString();
    return `
      <div class="comment-card" id="cc-${c.id}">
        <div class="comment-header">
          <div class="comment-name"><i class="fas fa-user-secret" style="margin-right:6px;font-size:0.7rem;"></i>${escapeHtml(c.name)}</div>
          <div class="comment-time">${timeStr}</div>
        </div>
        <div class="comment-text">${escapeHtml(c.comment)}</div>
        <div class="comment-likes">
          <button class="like-btn ${liked ? 'liked' : ''}" onclick="likeComment('${c.id}',this)">
            <i class="fas fa-heart"></i> ${liked ? 'LIKED' : 'LIKE'} &nbsp;<span class="lc">${c.likes || 0}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function likeComment(id, btn) {
  const liked = JSON.parse(localStorage.getItem('dw_liked') || '[]');
  if (liked.includes(id)) { showToast('Already liked!'); return; }
  liked.push(id);
  localStorage.setItem('dw_liked', JSON.stringify(liked));
  btn.classList.add('liked');
  btn.querySelector('i').style.color = 'var(--red)';
  const lc = btn.querySelector('.lc');
  lc.textContent = parseInt(lc.textContent) + 1;
  btn.innerHTML = `<i class="fas fa-heart" style="color:var(--red)"></i> LIKED &nbsp;<span class="lc">${lc.textContent}</span>`;
  showToast('❤ Liked!');
  const local = getLocalComments();
  const idx = local.findIndex(c => c.id === id);
  if (idx !== -1) { local[idx].likes = (local[idx].likes || 0) + 1; localStorage.setItem('dw_comments', JSON.stringify(local)); }
}

function escapeHtml(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveGsUrl() {
  const url = document.getElementById('gsUrlInput').value.trim();
  const status = document.getElementById('gsStatus');
  if (!url || !url.startsWith('https://script.google.com')) {
    status.textContent = '✗ Invalid URL — must start with https://script.google.com';
    status.className = 'gs-status err';
    return;
  }
  GS_URL = url;
  localStorage.setItem('dw_gs_url', GS_URL);
  status.textContent = '✓ URL saved! Comments will now sync to your Google Sheet.';
  status.className = 'gs-status ok';
  showToast('✅ Google Script URL saved!');
}

async function testGsUrl() {
  const url = document.getElementById('gsUrlInput').value.trim();
  const status = document.getElementById('gsStatus');
  if (!url) { showToast('Enter a URL first', true); return; }
  status.textContent = 'Testing connection...';
  status.className = 'gs-status';
  try {
    const res = await fetch(url + '?action=test');
    if (res.ok) {
      status.textContent = '✓ Connection successful! Script is reachable.';
      status.className = 'gs-status ok';
    } else {
      status.textContent = '✗ Script returned error ' + res.status;
      status.className = 'gs-status err';
    }
  } catch (e) {
    status.textContent = '⚠ CORS blocked (expected) — try saving and posting a comment.';
    status.className = 'gs-status ok';
  }
}

function copyGasCode() {
  const code = document.getElementById('gasCode').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('✅ Script copied to clipboard!')).catch(() => showToast('Copy failed — select manually', true));
}
</script>
